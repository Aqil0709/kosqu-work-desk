<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HRMS" />
    <meta name="theme-color" content="#0B1120" />
    <meta name="description" content="Kosqu Technolab HR Management System" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144.png" />
    <title>Kosqu Technolab HRMS</title>
    <!-- Anti-flash: apply saved theme before React hydrates to prevent FOUC -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('workdesk_theme') || 'dark';
          var html = document.documentElement;
          html.setAttribute('data-theme', theme);
          html.style.colorScheme = theme;
          if (theme === 'dark') html.classList.add('dark');
          else html.classList.remove('dark');
        } catch(e) {}
      })();
    </script>
    <style>
      /* Inline critical style to prevent white flash */
      html[data-theme='dark'] body { background: #0B1120; color: #CBD5E1; }
      html[data-theme='light'] body, html:not([data-theme]) body { background: #F8FAFC; color: #1E293B; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
