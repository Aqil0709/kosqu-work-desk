# Work Desk HRMS — Nginx Production Config
# Domain: work-desk.tech
# Frontend: https://work-desk.tech  (port 443)
# API:      https://work-desk.tech:5001  (port 5001 SSL → proxy to Node.js on :5002)
#
# Setup steps on server:
#   1. Install certbot: sudo apt install certbot python3-certbot-nginx
#   2. Get SSL cert: sudo certbot certonly --nginx -d work-desk.tech -d www.work-desk.tech
#   3. Copy this file to: /etc/nginx/sites-available/work-desk
#   4. ln -s /etc/nginx/sites-available/work-desk /etc/nginx/sites-enabled/work-desk
#   5. Place frontend build: sudo cp -r /path/to/frontend/dist /var/www/work-desk
#   6. sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name work-desk.tech www.work-desk.tech;
    return 301 https://work-desk.tech$request_uri;
}

# Frontend — port 443
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name work-desk.tech www.work-desk.tech;

    ssl_certificate     /etc/letsencrypt/live/work-desk.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/work-desk.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/work-desk;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check passthrough (optional)
    location /health {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# API — port 5001 (SSL termination → Node.js on :5002)
server {
    listen 5001 ssl http2;
    listen [::]:5001 ssl http2;
    server_name work-desk.tech;

    ssl_certificate     /etc/letsencrypt/live/work-desk.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/work-desk.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Proxy all requests to Node.js backend
    location / {
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Max body size for file uploads
        client_max_body_size 10m;
    }
}
